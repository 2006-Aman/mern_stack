<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3{
            color: red;
        }
        button{
            padding: 20px;
            width: 200px;
        }

    </style>

</head>
<body>
    <h1>This is an index page </h1>
    <h3 id = "welcome">Welcome to Chitkara</h3>
    <button id = "submit">Exit</button>

</body>
</html>
<script>
    var greet = document.getElementById("welcome");
    console.log(greet);

    var btn = document.getElementById("submit");


    btn.addEventListener("click", handleClick)

    var flag = false;

    function handleClick(){
        //alert("You are exiting the page");
        flag = ! flag
        if(flag){
            greet.innerHTML = "You have exited the page";
            greet.style.color = "green";
            
            btn.innerHTML = "Welcome";
        }
        else{
            greet.innerHTML = "Welcome to Chitkara";
            greet.style.color = "red";
            
            btn.innerHTML = "Exit";
        }  
    }
</script>
